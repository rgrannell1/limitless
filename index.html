<html>
  <head>

    <style>
      @font-face {
        font-family: "PixelPurl";
        src: url("./fonts/pixelpurl/PixelPurl.ttf") format
        ("truetype");
      }
      canvas {
        cursor: none !important;
      }

      * {
        font-family: "PixelPurl", sans-serif;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        font-family: "PixelPurl", sans-serif;
        text-align: center;
        font-size: 60px;

        padding-top: 100px;
      }

      .start-game {
        font-family: "PixelPurl", sans-serif;
        font-size: 30px;
        padding: 20px 40px;
        margin-top: 50px;
        background-color: #000;
        color: #fff;
        border: 2px solid #fff;
        cursor: pointer;
      }

    </style>
  </head>
  <body>
    <button class="start-game" id="insertTokenBtn">[Enter] Insert Token</button>

    <script>
      function addTheGame() {
        const script = document.createElement("script");
        script.src = window.location.hostname === "limitless.rgrannell.xyz"
          ? '/index.js'
          : '/dist/index.js';

        script.type = "module";
        document.body.appendChild(script);
      }

      // the things we do to trick people into playing audio...
      function startListener(key) {
        if (key.code !== "Enter") {
          return
        };
          // just the once
          document.removeEventListener("keyup", startListener);
          addTheGame();
      }

      document.addEventListener("keyup", startListener);
    </script>

    <canvas id="game"></canvas>
  </body>
</html>
